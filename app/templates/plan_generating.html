<html lang="uk">
<head>

  <title>Складаємо програму…</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% set active = 'plan' %}
  {% include "_nav.html" %}
  <div class="center">
    <div class="spin"></div>
    <h1>Складаємо твою програму…</h1>
    <p>Тренер аналізує форму, навантаження й історію бігу. Це займає до хвилини —
      сторінка оновиться сама. Можна не чекати: повернись пізніше на <a href="/plan">/plan</a>.</p>
  </div>
</body>
</html>
