<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Poll: the page reloads every 5s until generation finishes (then GET /plan
       shows the plan, or the setup form with an error). -->
  <meta http-equiv="refresh" content="5">
  <title>Складаємо програму…</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #0f1115; color: #e6e6e6; }
    a { color: #6cb6ff; text-decoration: none; }
    nav { margin-bottom: 1.5rem; color: #9aa4b2; }
    .card { max-width: 32rem; margin: 3rem auto; text-align: center; padding: 2rem 1.5rem;
      border: 1px solid #2a2f3a; border-radius: 12px; background: #14171f; }
    h1 { font-weight: 600; font-size: 1.3rem; margin: .8rem 0 .4rem; }
    p { color: #9aa4b2; line-height: 1.5; }
    .spin { width: 2.2rem; height: 2.2rem; margin: 0 auto; border: 3px solid #2a2f3a;
      border-top-color: #6cb6ff; border-radius: 50%; animation: r 1s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  {% set active = 'plan' %}
  {% include "_nav.html" %}
  <div class="card">
    <div class="spin"></div>
    <h1>Складаємо твою програму…</h1>
    <p>Тренер аналізує форму, навантаження й історію бігу. Це займає до хвилини —
      сторінка оновиться сама. Можна не чекати: повернись пізніше на <a href="/plan">/plan</a>.</p>
  </div>
</body>
</html>
