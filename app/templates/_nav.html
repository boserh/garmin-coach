<style>
  .topnav { display: flex; gap: 1.35rem; align-items: center; flex-wrap: wrap;
            margin-bottom: 2rem; padding-bottom: .9rem; font-size: .85rem;
            border-bottom: 1px solid #1b1f28; }
  .topnav a { color: #7a828f; text-decoration: none; letter-spacing: .01em; transition: color .12s; }
  .topnav a:hover { color: #e7e9ee; }
  .topnav a.active { color: #e7e9ee; font-weight: 600; }
  .topnav .logout-form { margin-left: auto; }
  .topnav button.logout { background: none; border: 0; padding: 0; cursor: pointer;
            font: inherit; color: #4b525d; letter-spacing: .01em; transition: color .12s; }
  .topnav button.logout:hover { color: #f7768e; }
</style>
<nav class="topnav">
  <a href="/dashboard"{% if active == 'dashboard' %} class="active"{% endif %}>Дашборд</a>
  <a href="/me"{% if active == 'me' %} class="active"{% endif %}>Мої дані</a>
  <a href="/plan"{% if active == 'plan' %} class="active"{% endif %}>Програма</a>
  <a href="/settings"{% if active == 'settings' %} class="active"{% endif %}>Налаштування</a>
  <a href="/info"{% if active == 'info' %} class="active"{% endif %}>Інфо</a>
  {% if user and user.is_admin %}
  <a href="/ui"{% if active == 'ui' %} class="active"{% endif %}>База даних</a>
  <a href="/admin/users"{% if active == 'users' %} class="active"{% endif %}>Користувачі</a>
  {% endif %}
  <form method="post" action="/logout" class="logout-form">
    <button type="submit" class="logout">Вихід</button>
  </form>
</nav>
