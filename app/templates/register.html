<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Реєстрація — Garmin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="auth">
  <form class="authcard" method="post" action="/register">
    <h1 class="brand">Реєстрація</h1>
    <div class="sub">Доступ активується після підтвердження адміністратором.</div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>
    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" autocomplete="new-password"
           minlength="6" required>
    <button class="btn" type="submit">Зареєструватись</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="alt">Вже є акаунт? <a href="/login">Увійти</a></div>
  </form>
</body>
</html>
