name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"  # matches the Raspberry Pi deployment target
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Migrations apply cleanly
        run: alembic upgrade head

      - name: Tests
        run: pytest -q
